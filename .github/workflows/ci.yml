name: CI

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check # lint → test → validate → build → bundle予算
      - run: npm run audit # 本番(prod)依存に high 以上の脆弱性が無いことを保証（dev ツールは対象外）
      - run: npm run coverage # カバレッジ閾値ゲート（退行防止）
